<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Course</title>
</head>
<body>

<h1>Edit Course</h1>

<a th:href="@{/admin}">Back to Admin</a>
<hr>

<form th:action="@{/admin/update-course}" th:object="${course}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label>Name:</label>
    <input type="text" th:field="*{name}" required><br><br>

    <label>Description:</label>
    <input type="text" th:field="*{description}" required><br><br>

    <label>Price:</label>
    <input type="number" step="0.01" th:field="*{price}" required><br><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
