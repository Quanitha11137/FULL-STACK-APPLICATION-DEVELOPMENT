<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Certificate Verification</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f6f7fb; margin:0; padding:0; }
        .wrap { max-width: 720px; margin: 40px auto; background:#fff; padding: 24px; border-radius: 12px; box-shadow:0 4px 14px rgba(0,0,0,.08); }
        .badge-ok { display:inline-block; padding:6px 12px; background:#e7f7ed; color:#1f7a3a; border-radius:999px; font-weight:bold; }
        .badge-no { display:inline-block; padding:6px 12px; background:#fde8e8; color:#b42318; border-radius:999px; font-weight:bold; }
        .row { margin: 10px 0; }
        .label { color:#555; width:160px; display:inline-block; }
        .value { font-weight:600; }
        .actions { margin-top: 18px; }
        a.btn { text-decoration:none; padding:10px 14px; border-radius:10px; border:1px solid #ddd; display:inline-block; }
    </style>
</head>
<body>

<div class="wrap">

    <h1>Certificate Verification</h1>

    <div th:if="${valid}">
        <p><span class="badge-ok">✅ Valid Certificate</span></p>

        <div class="row">
            <span class="label">Student:</span>
            <span class="value" th:text="${student}">Student</span>
        </div>

        <div class="row">
            <span class="label">Course:</span>
            <span class="value" th:text="${course}">Course</span>
        </div>

        <div class="row">
            <span class="label">Completed Date:</span>
            <span class="value" th:text="${date}">2026-03-03</span>
        </div>

        <!-- Optional: show certificate number if you pass it -->
        <div class="row" th:if="${certNo != null}">
            <span class="label">Certificate No:</span>
            <span class="value" th:text="${certNo}">FLAV-1-1</span>
        </div>

        <div class="actions">
            <a class="btn" th:href="@{/login}">Login</a>
        </div>
    </div>
    <div th:unless="${valid}">
        <p><span class="badge-no">❌ Invalid / Not Completed</span></p>
        <p>This certificate link is not valid OR the course is not completed yet.</p>

        <div class="actions">
            <a class="btn" th:href="@{/login}">Go to Login</a>
        </div>
    </div>

</div>

</body>
</html>
